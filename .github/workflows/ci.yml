name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: '-Xmx4096m -Dfile.encoding=UTF-8'

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      # ponytail: NO gradle/actions/setup-gradle here. That action resets JAVA_HOME
      # to the runner's system JDK (java-21-openjdk-amd64 on ubuntu-24.04), which on
      # this image has a broken lib/modules and crashes GradleWrapperMain with
      # NoSuchFileException. setup-java@v4 (temurin 17) sets a healthy JAVA_HOME and
      # ./gradlew runs on it directly. The committed wrapper jar (gradle-wrapper.jar,
      # see .gitignore negation) makes ./gradlew self-sufficient.
      - name: Validate Gradle Wrapper
        run: ./gradlew --version --no-daemon

      - name: Run KTLint
        run: ./gradlew ktlintCheck --no-daemon

      - name: Run Detekt
        run: ./gradlew detekt --no-daemon

      - name: Run Unit Tests
        run: ./gradlew test --no-daemon --continue

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/

  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: lint-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: unifiedcomms-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

  build-release:
    name: Build Release AAB
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Build Release AAB
        run: ./gradlew bundleRelease --no-daemon
        env:
          KEYSTORE_PATH: ${{ secrets.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: unifiedcomms-release
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 30

  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ponytail: deliberately NO actions/setup-java here. The Dependency-Check
      # action runs in its own Docker image that bundles its own JDK. setup-java
      # writes a host JAVA_HOME (/opt/hostedtoolcache/...) into $GITHUB_ENV which
      # is then injected into the container where that path does not exist ->
      # "JAVA_HOME is not defined correctly" and the scan aborts. Let the container
      # use its own java.
      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'UnifiedComms'
          path: '.'
          format: 'HTML'
          out: 'reports'
          args: '--failOnCVSS 7'

      - name: Upload Dependency Check Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/
          retention-days: 14
